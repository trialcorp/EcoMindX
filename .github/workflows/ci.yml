name: CI

# Runs the full test suite on every push and PR to the single `main` branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (typecheck + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint (ESLint + jsx-a11y accessibility rules)
        run: npm run lint
      - name: Format check (Prettier)
        run: npm run format:check
      - name: Unit + accessibility tests (coverage gate ≥90%)
        run: npm run test:coverage
      - name: Production build
        run: npm run build
